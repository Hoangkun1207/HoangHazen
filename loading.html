<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    background:#0f1017;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    transition:0.8s;
}

.loader-container{
    text-align:center;
}

/* Vòng tròn */
.loader-ring{
    width:120px;
    height:120px;
    border-radius:50%;
    border:12px solid rgba(255,255,255,.08);
    position:relative;
    margin:auto;
    box-shadow:
    inset 0 0 10px rgba(255,255,255,.05);
}

/* Thanh xanh chạy */
.loader-dot{
    width:38px;
    height:14px;
    border-radius:30px;
    background:#00aaff;
    position:absolute;
    top:50%;
    left:50%;
    transform-origin:-40px center;
    box-shadow:
    0 0 10px #00aaff,
    0 0 20px #00aaff,
    0 0 30px #00aaff;
    animation:rotateDot 1.5s linear infinite;
}

.loading-text{
    margin-top:25px;
    color:#ffffff;
    font-size:38px;
    font-family:Arial,sans-serif;
    font-weight:700;
}

.loading-dots{
    display:inline-block;
    width:30px;
}

@keyframes rotateDot{
    from{
        transform:
        rotate(0deg)
        translateX(40px);
    }

    to{
        transform:
        rotate(360deg)
        translateX(40px);
    }
}

/* Glow nền */
body::before{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    background:rgba(0,170,255,.08);
    filter:blur(100px);
}
</style>

</head>

<body>

<div class="loader-container">

```
<div class="loader-ring">
    <div class="loader-dot"></div>
</div>

<div class="loading-text">
    Loading<span class="loading-dots" id="dots"></span>
</div>
```

</div>

<script>

const dots = document.getElementById("dots");

let count = 0;

setInterval(()=>{

    count++;

    if(count > 3) count = 0;

    dots.innerHTML = ".".repeat(count);

},400);

/* Sau 4 giây chuyển trang */

setTimeout(()=>{

    document.body.style.opacity="0";

    setTimeout(()=>{

        window.location.href="index.html";

    },800);

},4000);

</script>

</body>
</html>
