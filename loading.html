<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading System...</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050816;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    transition:1s;
}

.loader{
    width: 450px;
    max-width: 90%;
    text-align: center;
    position: relative;
    z-index: 1;
}

/* Vầng sáng phía sau mờ ảo */
.glow-core {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 250px;
    height: 250px;
    background: linear-gradient(90deg, #00d4ff, #7c3aed);
    filter: blur(100px);
    opacity: 0.3;
    z-index: -1;
    animation: pulse-glow 2s infinite alternate;
}

@keyframes pulse-glow {
    0% { opacity: 0.2; transform: translate(-50%, -50%) scale(0.8); }
    100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.1); }
}

/* Chữ hiển thị phần trăm */
.percent {
    font-size: 70px;
    font-weight: 900;
    background: linear-gradient(90deg, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
}

/* Thanh loading siêu mỏng hiện đại */
.progress-bar {
    width: 100%;
    height: 3px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 5px;
    overflow: hidden;
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
    position: relative;
}

.fill {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #00d4ff, #7c3aed);
    box-shadow: 0 0 20px #00d4ff;
    border-radius: 5px;
    position: relative;
}

/* Tia sáng lướt trên thanh loading */
.fill::after {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 20px;
    background: #fff;
    filter: blur(5px);
    opacity: 0.8;
}

.text {
    text-align: center;
    margin-top: 25px;
    color: #bdbdbd;
    font-size: 14px;
    letter-spacing: 6px;
    text-transform: uppercase;
    font-weight: 600;
    animation: text-pulse 1.5s infinite;
}

@keyframes text-pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); }
}

</style>
</head>

<body>

<div class="loader">
    <div class="glow-core"></div>
    <div class="percent" id="percent">0%</div>
    
    <div class="progress-bar">
        <div class="fill" id="fill"></div>
    </div>
    
    <div class="text" id="status-text">
        INITIALIZING SYSTEM...
    </div>
</div>

<script>
const fill = document.getElementById("fill");
const percent = document.getElementById("percent");
const statusText = document.getElementById("status-text");

let progress = 0;

const loading = setInterval(()=>{

    progress++;

    // Cập nhật độ dài thanh bar
    fill.style.width = progress + "%";

    // Cập nhật text phần trăm
    percent.innerHTML = progress + "%";

    // Thay đổi trạng thái text cho ngầu
    if(progress === 40) statusText.innerHTML = "LOADING ASSETS...";
    if(progress === 80) statusText.innerHTML = "FINALIZING...";

    if(progress >= 100){

        clearInterval(loading);

        statusText.innerHTML = "SYSTEM READY";
        statusText.style.color = "#00d4ff";

        setTimeout(()=>{

            document.body.style.opacity="0";

            setTimeout(()=>{

                window.location.href="index.html";

            },1000);

        },500);

    }

},40);
</script>

<script>
/* =========================
   HOANG KUN SECURITY SYSTEM
   ========================= */

let submitTimes = [];
const MAX_SUBMIT = 3;
const BLOCK_TIME = 60000; // 60 giây

// Ở trang intro này không có form comment nên các biến này có thể bị null
const commentForm = document.getElementById("commentForm");
const btnSubmit = commentForm ? commentForm.querySelector(".btn-submit") : null;

/* -------------------------
   THÔNG BÁO ĐẸP
------------------------- */
function showNotification(message, type = "warning") {

    let old = document.querySelector(".hk-alert");
    if (old) old.remove();

    const box = document.createElement("div");
    box.className = "hk-alert";

    const colors = {
        success: "#00ff88",
        warning: "#ffae00",
        error: "#ff3333",
        info: "#00bfff"
    };

    box.innerHTML = `
        <div class="hk-alert-content">
            <div class="hk-alert-icon">⚠</div>
            <div class="hk-alert-text">${message}</div>
        </div>
    `;

    box.style.cssText = `
        position:fixed;
        top:30px;
        right:30px;
        z-index:999999999;
        background:#111;
        border-left:5px solid ${colors[type]};
        color:#fff;
        padding:15px 20px;
        min-width:300px;
        border-radius:12px;
        box-shadow:0 0 25px rgba(0,0,0,.5);
        animation:slideIn .4s ease;
        font-family:sans-serif;
    `;

    document.body.appendChild(box);

    setTimeout(() => {
        box.style.opacity = "0";
        box.style.transform = "translateX(100px)";
        setTimeout(() => box.remove(), 500);
    }, 3500);
}

const style = document.createElement("style");
style.innerHTML = `
@keyframes slideIn{
    from{
        opacity:0;
        transform:translateX(100px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}
`;
document.head.appendChild(style);

/* -------------------------
   CHỐNG SPAM FORM
------------------------- */
if(commentForm) {
    commentForm.addEventListener("submit", function(e){

        const now = Date.now();

        submitTimes = submitTimes.filter(
            time => now - time < BLOCK_TIME
        );

        submitTimes.push(now);

        if(submitTimes.length > MAX_SUBMIT){

            e.preventDefault();

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = "🚫 Đã khóa";

            showNotification(
                "Bạn thao tác quá nhanh! Hệ thống đã tạm khóa 60 giây.",
                "error"
            );

            let countdown = 60;

            const timer = setInterval(() => {

                btnSubmit.innerHTML =
                    `⏳ ${countdown}s`;

                countdown--;

                if(countdown < 0){

                    clearInterval(timer);

                    btnSubmit.disabled = false;
                    btnSubmit.innerHTML = "Gửi bình luận";

                    submitTimes = [];

                    showNotification(
                        "Đã mở khóa bình luận.",
                        "success"
                    );
                }

            },1000);
        }
    });
}


function lockWebsite(reason = "Phát hiện hành vi truy cập công cụ dành cho nhà phát triển.") {
    if (document.getElementById("hk-lock")) return;

    const overlay = document.createElement("div");
    overlay.id = "hk-lock";

    overlay.innerHTML = `
        <div class="hk-bg"></div>

        <div class="hk-card">
            <div class="hk-icon">🤖</div>

            <h1>HOANG KUN SECURITY</h1>

            <div class="hk-message">
                <span class="warn">⚠</span>
                <div>
                    <p>${reason}</p>
                    <small>Trang web đã bị khóa vì lý do bảo mật</small>
                </div>
            </div>

            <button onclick="location.reload()">🔄 TẢI LẠI TRANG</button>

            <p class="hk-footer">© 2026 HOANG KUN</p>
        </div>
    `;

    const lockStyle = document.createElement("style");
    lockStyle.innerHTML = `
    #hk-lock{
        position:fixed;
        inset:0;
        z-index:999999999;
        display:flex;
        justify-content:center;
        align-items:center;
        font-family:Poppins, sans-serif;
        overflow:hidden;
    }

    /* nền sao */
    .hk-bg{
        position:absolute;
        inset:0;
        background: radial-gradient(circle at center, #0b001a, #05010f 60%, #000);
    }

    .hk-bg::before{
        content:"";
        position:absolute;
        inset:0;
        background-image: radial-gradient(#7c3aed 1px, transparent 1px);
        background-size: 60px 60px;
        opacity:0.25;
        animation: move 20s linear infinite;
    }

    @keyframes move{
        from{transform:translateY(0);}
        to{transform:translateY(-200px);}
    }

    /* card chính */
    .hk-card{
        position:relative;
        width:520px;
        max-width:92%;
        padding:50px 35px;
        border-radius:25px;
        text-align:center;
        background:rgba(15, 10, 40, 0.6);
        border:1px solid rgba(124,58,237,0.3);
        backdrop-filter:blur(18px);
        box-shadow:
            0 0 25px rgba(0,212,255,0.3),
            0 0 60px rgba(124,58,237,0.4);
        animation: pop .5s ease;
    }

    @keyframes pop{
        from{transform:scale(0.8); opacity:0;}
        to{transform:scale(1); opacity:1;}
    }

    /* icon robot */
    .hk-icon{
        width:90px;
        height:90px;
        margin:auto;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:42px;
        border-radius:50%;
        background:linear-gradient(135deg,#00d4ff,#7c3aed);
        box-shadow:0 0 30px #00d4ff;
        margin-bottom:20px;
    }

    h1{
        font-size:28px;
        font-weight:800;
        background:linear-gradient(90deg,#00d4ff,#a855f7,#ff00ff);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        margin-bottom:20px;
    }

    /* message box */
    .hk-message{
        display:flex;
        gap:12px;
        text-align:left;
        padding:18px;
        border-radius:15px;
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(255,255,255,0.1);
        margin-bottom:25px;
    }

    .warn{
        color:#ffcc00;
        font-size:20px;
    }

    .hk-message p{
        margin:0;
        color:#fff;
        font-size:14px;
    }

    .hk-message small{
        color:#aaa;
    }

    button{
        padding:12px 30px;
        border:none;
        border-radius:12px;
        cursor:pointer;
        font-weight:600;
        color:white;
        background:linear-gradient(90deg,#00d4ff,#7c3aed);
        box-shadow:0 0 20px rgba(124,58,237,0.5);
        transition:0.3s;
    }

    button:hover{
        transform:scale(1.05);
    }

    .hk-footer{
        margin-top:15px;
        font-size:12px;
        color:#777;
    }
    `;

    document.head.appendChild(lockStyle);
    document.body.appendChild(overlay);
}

  /* =========================
   ANTI DEVTOOLS + RIGHT CLICK
   ========================= */

function blockAction(reason) {
    lockWebsite(reason);
}

/* CHẶN CHUỘT PHẢI */
document.addEventListener("contextmenu", function(e){
    e.preventDefault();
    showNotification("Chuột phải đã bị vô hiệu hóa!", "warning");
});

/* CHẶN PHÍM DEVTOOLS */
document.addEventListener("keydown", function(e){

    const key = e.key.toLowerCase();

    const blocked =
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && (key === "i" || key === "j" || key === "c")) ||
        (e.ctrlKey && key === "u") ||
        (e.ctrlKey && key === "s");

    if(blocked){
        e.preventDefault();
        e.stopPropagation();

        blockAction("Phát hiện truy cập công cụ lập trình (DevTools).");
    }
}, true);

/* CHẶN COPY */
document.addEventListener("copy", function(e){
    e.preventDefault();
    showNotification("Copy đã bị vô hiệu hóa!", "warning");
});

/* CHẶN SELECT ALL */
document.addEventListener("selectstart", function(e){
    e.preventDefault();
});

/* PHÁT HIỆN DEVTOOLS MỞ (DETECT THÊM) */
let devtools = false;

setInterval(() => {
    const widthThreshold = window.outerWidth - window.innerWidth > 200;
    const heightThreshold = window.outerHeight - window.innerHeight > 200;

    if((widthThreshold || heightThreshold) && !devtools){
        devtools = true;
        blockAction("DevTools đã được phát hiện!");
    }
}, 1000);
  
</script>

</body>
</html>
