<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1020;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial,sans-serif;
    transition:0.8s;
}

/* Glow nền */
body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:radial-gradient(
        circle,
        rgba(0,212,255,.15),
        transparent
    );
    filter:blur(80px);
}

/* Khung */
.loader-box{
    width:700px;
    max-width:90%;
    text-align:center;
}

/* Đường */
.road{
    position:relative;
    height:80px;
    margin-bottom:15px;
}

.road::after{
    content:"";
    position:absolute;
    bottom:20px;
    left:0;
    width:100%;
    height:4px;
    background:#444;
    border-radius:20px;
}

/* Xe */
.car{
    position:absolute;
    left:0;
    top:0;
    font-size:48px;
    animation:bounce .25s infinite alternate;
}

@keyframes bounce{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-4px);
    }
}

/* Thanh loading */
.progress{
    width:100%;
    height:24px;
    background:#1a2238;
    border-radius:50px;
    overflow:hidden;
    position:relative;
    box-shadow:
        inset 0 0 10px rgba(255,255,255,.1);
}

/* Nước */
.water{
    width:0%;
    height:100%;
    position:absolute;
    left:0;
    top:0;
    border-radius:50px;
    overflow:hidden;
    background:linear-gradient(
        90deg,
        #00d4ff,
        #3b82f6,
        #7c3aed
    );
}

/* Sóng nước */
.water::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    left:-50%;
    top:-60%;
    background:
    radial-gradient(
        circle,
        rgba(255,255,255,.4) 10%,
        transparent 12%
    );

    background-size:35px 35px;

    animation:wave 2s linear infinite;
}

@keyframes wave{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-80px);
    }
}

.percent{
    margin-top:15px;
    color:white;
    font-size:24px;
    font-weight:bold;
}

.loading-text{
    margin-top:10px;
    color:#00d4ff;
    font-size:18px;
    letter-spacing:2px;
}
</style>

</head>

<body>

<div class="loader-box">

```
<div class="road">
    <div class="car" id="car">🏎️</div>
</div>

<div class="progress">
    <div class="water" id="water"></div>
</div>

<div class="percent" id="percent">0%</div>

<div class="loading-text">
    Loading Portfolio...
</div>
```

</div>

<script>

const car = document.getElementById("car");
const water = document.getElementById("water");
const percent = document.getElementById("percent");

let progress = 0;

const loading = setInterval(()=>{

    progress += 0.5;

    water.style.width = progress + "%";

    car.style.left =
        `calc(${progress}% - 25px)`;

    percent.innerHTML =
        Math.floor(progress) + "%";

    if(progress >= 100){

        clearInterval(loading);

        car.innerHTML = "🏁";

        setTimeout(()=>{

            document.body.style.opacity = "0";

            setTimeout(()=>{

                window.location.href = "index.html";

            },800);

        },600);
    }

},25);

</script>

</body>
</html>
