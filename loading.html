<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050816;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial,sans-serif;
    transition:1s;
}

.loader{
    width:700px;
    max-width:90%;
}

/* Khu vực xe */

.car-wrap{
    position:relative;
    height:90px;
}

.car{
    position:absolute;
    left:0;
    top:0;
    font-size:60px;

    /* quay sang phải */
    transform:scaleX(-1);

    animation:bounce .25s infinite alternate;
}

@keyframes bounce{

    from{
        transform:
        scaleX(-1)
        translateY(0);
    }

    to{
        transform:
        scaleX(-1)
        translateY(-5px);
    }

}

/* Thanh loading */

.progress{
    width:100%;
    height:28px;
    background:#1b2540;
    border-radius:50px;
    overflow:hidden;
    position:relative;

    box-shadow:
    inset 0 0 10px rgba(255,255,255,.1);
}

/* Nước */

.water{
    width:0%;
    height:100%;
    position:absolute;
    left:0;
    top:0;

    background:linear-gradient(
        90deg,
        #00d4ff,
        #3b82f6,
        #7c3aed
    );

    overflow:hidden;
}

/* Hiệu ứng nước */

.water::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    left:-50%;
    top:-50%;

    background:
    radial-gradient(
        rgba(255,255,255,.35) 10%,
        transparent 12%
    );

    background-size:30px 30px;

    animation:wave 2s linear infinite;
}

@keyframes wave{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(-80px);
    }

}

.percent{
    margin-top:15px;
    text-align:center;
    color:white;
    font-size:30px;
    font-weight:bold;
}

.text{
    text-align:center;
    margin-top:10px;
    color:#00d4ff;
    font-size:18px;
}

</style>

</head>

<body>

<div class="loader">

```
<div class="car-wrap">
    <div class="car" id="car">🚗</div>
</div>

<div class="progress">
    <div class="water" id="water"></div>
</div>

<div class="percent" id="percent">0%</div>

<div class="text">
    Loading Portfolio...
</div>
```

</div>

<script>

const water = document.getElementById("water");
const car = document.getElementById("car");
const percent = document.getElementById("percent");

let progress = 0;

const loading = setInterval(()=>{

    progress++;

    water.style.width = progress + "%";

    car.style.left =
    `calc(${progress}% - 40px)`;

    percent.innerHTML =
    progress + "%";

    if(progress >= 100){

        clearInterval(loading);

        car.innerHTML = "🏁";

        setTimeout(()=>{

            document.body.style.opacity="0";

            setTimeout(()=>{

                window.location.href="index.html";

            },1000);

        },500);

    }

},40);

</script>

<script>
/* =========================
   HOANG KUN SECURITY SYSTEM
   ========================= */

let submitTimes = [];
const MAX_SUBMIT = 3;
const BLOCK_TIME = 60000; // 60 giây

const commentForm = document.getElementById("commentForm");
const btnSubmit = commentForm.querySelector(".btn-submit");

/* -------------------------
   THÔNG BÁO ĐẸP
------------------------- */
function showNotification(message, type = "warning") {

    let old = document.querySelector(".hk-alert");
    if (old) old.remove();

    const box = document.createElement("div");
    box.className = "hk-alert";

    const colors = {
        success: "#00ff88",
        warning: "#ffae00",
        error: "#ff3333",
        info: "#00bfff"
    };

    box.innerHTML = `
        <div class="hk-alert-content">
            <div class="hk-alert-icon">⚠</div>
            <div class="hk-alert-text">${message}</div>
        </div>
    `;

    box.style.cssText = `
        position:fixed;
        top:30px;
        right:30px;
        z-index:999999999;
        background:#111;
        border-left:5px solid ${colors[type]};
        color:#fff;
        padding:15px 20px;
        min-width:300px;
        border-radius:12px;
        box-shadow:0 0 25px rgba(0,0,0,.5);
        animation:slideIn .4s ease;
        font-family:sans-serif;
    `;

    document.body.appendChild(box);

    setTimeout(() => {
        box.style.opacity = "0";
        box.style.transform = "translateX(100px)";
        setTimeout(() => box.remove(), 500);
    }, 3500);
}

const style = document.createElement("style");
style.innerHTML = `
@keyframes slideIn{
    from{
        opacity:0;
        transform:translateX(100px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}
`;
document.head.appendChild(style);

/* -------------------------
   CHỐNG SPAM FORM
------------------------- */
commentForm.addEventListener("submit", function(e){

    const now = Date.now();

    submitTimes = submitTimes.filter(
        time => now - time < BLOCK_TIME
    );

    submitTimes.push(now);

    if(submitTimes.length > MAX_SUBMIT){

        e.preventDefault();

        btnSubmit.disabled = true;
        btnSubmit.innerHTML = "🚫 Đã khóa";

        showNotification(
            "Bạn thao tác quá nhanh! Hệ thống đã tạm khóa 60 giây.",
            "error"
        );

        let countdown = 60;

        const timer = setInterval(() => {

            btnSubmit.innerHTML =
                `⏳ ${countdown}s`;

            countdown--;

            if(countdown < 0){

                clearInterval(timer);

                btnSubmit.disabled = false;
                btnSubmit.innerHTML = "Gửi bình luận";

                submitTimes = [];

                showNotification(
                    "Đã mở khóa bình luận.",
                    "success"
                );
            }

        },1000);
    }
});

/* -------------------------
   MÀN HÌNH KHÓA WEB
------------------------- */
function lockWebsite(reason){

    if(document.querySelector("#hk-lock"))
        return;

    const overlay = document.createElement("div");

    overlay.id = "hk-lock";

    overlay.innerHTML = `
        <div class="hk-lock-box">
            <h1>🛡 HOANG KUN SECURITY</h1>
            <p>${reason}</p>
            <button onclick="location.reload()">
                TẢI LẠI TRANG
            </button>
        </div>
    `;

    overlay.style.cssText = `
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.98);
        backdrop-filter:blur(10px);
        z-index:999999999;
        display:flex;
        justify-content:center;
        align-items:center;
        color:white;
        text-align:center;
        font-family:sans-serif;
    `;

    document.body.appendChild(overlay);
}

/* -------------------------
   CHẶN PHÍM TẮT
------------------------- */
document.addEventListener("keydown", function(e){

    const blocked =
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && e.key === "I") ||
        (e.ctrlKey && e.shiftKey && e.key === "J") ||
        (e.ctrlKey && e.shiftKey && e.key === "C") ||
        (e.ctrlKey && e.key === "U") ||
        (e.ctrlKey && e.key === "S");

    if(blocked){

        e.preventDefault();

        lockWebsite(
            "Phát hiện hành vi truy cập công cụ dành cho nhà phát triển."
        );
    }
});

/* -------------------------
   PHÁT HIỆN DEVTOOLS
------------------------- */
let devtoolsOpened = false;

setInterval(() => {

    const widthThreshold =
        window.outerWidth - window.innerWidth > 160;

    const heightThreshold =
        window.outerHeight - window.innerHeight > 160;

    if((widthThreshold || heightThreshold) &&
        !devtoolsOpened){

        devtoolsOpened = true;

        lockWebsite(
            "DevTools đã được phát hiện. Trang web đã bị khóa."
        );
    }

},1000);

/* -------------------------
   CHUỘT PHẢI
------------------------- */
document.addEventListener("contextmenu", e => {

    e.preventDefault();

    showNotification(
        "Chuột phải đã bị vô hiệu hóa.",
        "warning"
    );
});

</script>

</body>
</html>
