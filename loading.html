<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050816;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial,sans-serif;
    transition:1s;
}

.loader{
    width:700px;
    max-width:90%;
}

/* Khu vực xe */

.car-wrap{
    position:relative;
    height:90px;
}

.car{
    position:absolute;
    left:0;
    top:0;
    font-size:60px;

    /* quay sang phải */
    transform:scaleX(-1);

    animation:bounce .25s infinite alternate;
}

@keyframes bounce{

    from{
        transform:
        scaleX(-1)
        translateY(0);
    }

    to{
        transform:
        scaleX(-1)
        translateY(-5px);
    }

}

/* Thanh loading */

.progress{
    width:100%;
    height:28px;
    background:#1b2540;
    border-radius:50px;
    overflow:hidden;
    position:relative;

    box-shadow:
    inset 0 0 10px rgba(255,255,255,.1);
}

/* Nước */

.water{
    width:0%;
    height:100%;
    position:absolute;
    left:0;
    top:0;

    background:linear-gradient(
        90deg,
        #00d4ff,
        #3b82f6,
        #7c3aed
    );

    overflow:hidden;
}

/* Hiệu ứng nước */

.water::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    left:-50%;
    top:-50%;

    background:
    radial-gradient(
        rgba(255,255,255,.35) 10%,
        transparent 12%
    );

    background-size:30px 30px;

    animation:wave 2s linear infinite;
}

@keyframes wave{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(-80px);
    }

}

.percent{
    margin-top:15px;
    text-align:center;
    color:white;
    font-size:30px;
    font-weight:bold;
}

.text{
    text-align:center;
    margin-top:10px;
    color:#00d4ff;
    font-size:18px;
}

</style>

</head>

<body>

<div class="loader">

```
<div class="car-wrap">
    <div class="car" id="car">🚗</div>
</div>

<div class="progress">
    <div class="water" id="water"></div>
</div>

<div class="percent" id="percent">0%</div>

<div class="text">
    Loading Portfolio...
</div>
```

</div>

<script>

const water = document.getElementById("water");
const car = document.getElementById("car");
const percent = document.getElementById("percent");

let progress = 0;

const loading = setInterval(()=>{

    progress++;

    water.style.width = progress + "%";

    car.style.left =
    `calc(${progress}% - 40px)`;

    percent.innerHTML =
    progress + "%";

    if(progress >= 100){

        clearInterval(loading);

        car.innerHTML = "🏁";

        setTimeout(()=>{

            document.body.style.opacity="0";

            setTimeout(()=>{

                window.location.href="index.html";

            },1000);

        },500);

    }

},40);

</script>

    <script>
        /* --- HỆ THỐNG BẢO MẬT HOANG KUN --- */
let spamCount = 0;
const commentForm = document.getElementById('commentForm');
const btnSubmit = commentForm.querySelector('.btn-submit');

// 1. Chống Spam
commentForm.addEventListener('submit', function(e) {
    spamCount++;
    if (spamCount > 3) {
        e.preventDefault();
        btnSubmit.disabled = true;
        btnSubmit.innerText = "Bạn đã bị chặn spam!";
        btnSubmit.style.background = "#555";
        showNotification("Đừng spam nữa ông ơi! F5 để thử lại.", "info");
    }
});

// 2. Chặn F12 / Inspect và Khóa Web
function lockWebsite() {
    const overlay = document.createElement('div');
    overlay.style.cssText = `
        position: fixed; inset: 0; background: #000; z-index: 9999999;
        display: flex; justify-content: center; align-items: center;
        color: #fff; font-size: 24px; text-align: center; flex-direction: column;
    `;
    overlay.innerHTML = `
        <h1 style="color: #ff0000;">Nghiêm cấm soi code!</h1>
        <p>Web đã bị khóa. Vui lòng F5 (tải lại) để tiếp tục.</p>
    `;
    document.body.appendChild(overlay);
}

// Theo dõi khi có người mở DevTools
let threshold = 160; 
window.addEventListener('resize', () => {
    if (window.outerWidth - window.innerWidth > threshold || 
        window.outerHeight - window.innerHeight > threshold) {
        lockWebsite();
    }
});

// Chặn các phím tắt (F12, Ctrl+U, v.v)
document.addEventListener('keydown', (e) => {
    if (e.keyCode === 123 || (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 73))) {
        e.preventDefault();
        lockWebsite();
    }
});
    </script>

</body>
</html>
