<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome | Nguyễn Việt Hoàng</title>
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }
    body {
      background: #110622;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden; transition: opacity 0.8s ease-in-out;
    }
    
    .intro-icons { display: flex; gap: 20px; margin-bottom: 30px; }
    .icon-circle {
      width: 50px; height: 50px; border-radius: 50%; background: rgba(124, 58, 237, 0.1);
      display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff;
      box-shadow: 0 0 25px rgba(124, 58, 237, 0.4); border: 1px solid rgba(124, 58, 237, 0.2);
    }
    
    .intro-title { color: #ffffff; font-size: 45px; font-weight: 700; margin-bottom: 5px; text-align: center; }
    .intro-subtitle { color: #a855f7; font-size: 50px; font-weight: 800; text-align: center; margin-bottom: 40px; text-shadow: 0 0 20px rgba(168, 85, 247, 0.3); }
    
    .intro-typing-box {
      background: rgba(124, 58, 237, 0.15); border: 1px solid rgba(124, 58, 237, 0.3);
      padding: 10px 25px; border-radius: 999px; display: flex; align-items: center; gap: 10px;
      color: #c084fc; font-size: 18px; box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
    }
    
    .cursor-blink { font-weight: bold; animation: blink 0.8s infinite; color: #c084fc; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* --- HIỆU ỨNG ẨN TRƯỚC KHI HIỆN --- */
    .step-animate {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    
    /* Class thêm vào bằng JS để làm nó hiện lên */
    .step-animate.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 768px) { .intro-title { font-size: 30px; } .intro-subtitle { font-size: 35px; } }
  </style>
</head>
<body>

  <div class="intro-icons">
    <!-- Gắn class step-animate cho từng phần tử -->
    <div class="icon-circle step-animate"><i class="fas fa-code"></i></div>
    <div class="icon-circle step-animate"><i class="fas fa-user"></i></div>
    <div class="icon-circle step-animate"><i class="fab fa-github"></i></div>
  </div>
  
  <h1 class="intro-title step-animate">Welcome To My</h1>
  <h2 class="intro-subtitle step-animate">Portfolio Website</h2>
  
  <div class="intro-typing-box step-animate">
    <i class="fas fa-globe"></i>
    <span id="typing-text"></span><span class="cursor-blink">|</span>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const textToType = "hoangkunstore.id.vn"; 
      const typingElement = document.getElementById("typing-text");
      const steps = document.querySelectorAll(".step-animate");
      
      let delay = 300; 
      
      // 1. Cho lần lượt từng cái hiện lên
      steps.forEach((step) => {
        setTimeout(() => {
          step.classList.add("show");
        }, delay);
        delay += 300; 
      });

      // 2. Chờ mọi thứ hiện lên hết rồi mới gõ chữ
      setTimeout(() => {
        let index = 0;
        function typeEffect() {
          if (index < textToType.length) {
            typingElement.textContent += textToType.charAt(index);
            index++;
            setTimeout(typeEffect, 100); 
          } else {
            // 3. Gõ xong -> Làm mờ trang -> Cấp vé -> Chuyển về index
            setTimeout(() => {
              document.body.style.opacity = "0"; 
              setTimeout(() => {
                
                // BẮT BUỘC PHẢI CÓ CÁI NÀY ĐỂ FILE BỐ NHẬN DIỆN
                sessionStorage.setItem("introDone", "true");
                
                // ĐÁ VỀ TRANG CHÍNH
                window.location.href = "index.html"; 

              }, 800);
            }, 1000);
          }
        }
        
        typeEffect();
        
      }, delay + 200);
    });
  </script>

</body>
</html>
