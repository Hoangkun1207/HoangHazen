<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome | Nguyễn Việt Hoàng</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }
    
    body {
      background: #110622;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden; transition: opacity 0.8s ease-in-out;
    }
    
    .intro-icons { display: flex; gap: 20px; margin-bottom: 30px; }
    
    .icon-circle {
      width: 50px; height: 50px; border-radius: 50%; background: rgba(124, 58, 237, 0.1);
      display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff;
      box-shadow: 0 0 25px rgba(124, 58, 237, 0.4); border: 1px solid rgba(124, 58, 237, 0.2);
    }
    
    /* Layout chứa chữ */
    .intro-title { 
      color: #ffffff; font-size: 45px; font-weight: 700; margin-bottom: 5px; 
      display: flex; gap: 12px; justify-content: center;
    }
    .intro-subtitle { 
      color: #a855f7; font-size: 50px; font-weight: 800; text-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
      display: flex; gap: 15px; justify-content: center; margin-bottom: 40px; 
    }
    
    .intro-typing-box {
      background: rgba(124, 58, 237, 0.15); border: 1px solid rgba(124, 58, 237, 0.3);
      padding: 10px 25px; border-radius: 999px; display: flex; align-items: center; gap: 10px;
      color: #c084fc; font-size: 18px; box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
    }
    
    .cursor-blink { font-weight: bold; animation: blink 0.8s infinite; color: #c084fc; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* --- CÁC HƯỚNG BAY --- */
    .fade-up { opacity: 0; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .fade-left { opacity: 0; transform: translateX(-50px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .fade-right { opacity: 0; transform: translateX(50px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
    
    /* Kích hoạt hiện lên */
    .show { opacity: 1 !important; transform: translate(0, 0) !important; }

    @media (max-width: 768px) { 
      .intro-title { font-size: 30px; gap: 8px; } 
      .intro-subtitle { font-size: 35px; gap: 10px; } 
    }
  </style>
</head>
<body>

  <div class="intro-icons">
    <div class="icon-circle fade-up"><i class="fas fa-code"></i></div>
    <div class="icon-circle fade-up"><i class="fas fa-user"></i></div>
    <div class="icon-circle fade-up"><i class="fab fa-github"></i></div>
  </div>
  
  <h1 class="intro-title">
    <span class="fade-left">Welcome</span>
    <span class="fade-up">To</span>
    <span class="fade-right">My</span>
  </h1>
  
  <h2 class="intro-subtitle">
    <span class="fade-left">Website</span>
    <span class="fade-right">Hoang Kun</span>
  </h2>
  
  <div class="intro-typing-box fade-up" id="link-box">
    <i class="fas fa-globe"></i>
    <span id="typing-text"></span><span class="cursor-blink">|</span>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const textToType = "hoangkunstore.id.vn"; 
      const typingElement = document.getElementById("typing-text");
      
      const icons = document.querySelectorAll(".icon-circle");
      const titleWords = document.querySelectorAll(".intro-title span");
      const subtitleWords = document.querySelectorAll(".intro-subtitle span");
      const linkBox = document.getElementById("link-box");
      
      let delay = 300; 
      
      // 1. Icon hiện lần lượt từ dưới lên
      icons.forEach((icon, index) => {
        setTimeout(() => { icon.classList.add("show"); }, delay + (index * 150));
      });
      
      delay += 600; // Đợi icon hiện xong

      // 2. Chữ "Welcome To My" bay từ 3 hướng vào cùng lúc
      setTimeout(() => {
        titleWords.forEach(word => word.classList.add("show"));
      }, delay);
      
      delay += 300;

      // 3. Chữ "Portfolio Website" bay từ 2 hướng vào cùng lúc
      setTimeout(() => {
        subtitleWords.forEach(word => word.classList.add("show"));
      }, delay);
      
      delay += 400;

      // 4. Hiện hộp link từ dưới lên
      setTimeout(() => {
        linkBox.classList.add("show");
      }, delay);
      
      delay += 500;

      // 5. Chờ hộp link hiện xong thì bắt đầu gõ chữ
      setTimeout(() => {
        let index = 0;
        function typeEffect() {
          if (index < textToType.length) {
            typingElement.textContent += textToType.charAt(index);
            index++;
            setTimeout(typeEffect, 80); // Tốc độ gõ
          } else {
            // Gõ xong -> Mờ trang -> Đá về trang chính
            setTimeout(() => {
              document.body.style.opacity = "0"; 
              setTimeout(() => {
                sessionStorage.setItem("introDone", "true");
                window.location.href = "loading.html";
              }, 800);
            }, 1000);
          }
        }
        
        typeEffect();
      }, delay);
      
    });
  </script>

 <script>
/* =========================
   HOANG KUN SECURITY SYSTEM
   ========================= */

let submitTimes = [];
const MAX_SUBMIT = 3;
const BLOCK_TIME = 60000; // 60 giây

const commentForm = document.getElementById("commentForm");
const btnSubmit = commentForm.querySelector(".btn-submit");

/* -------------------------
   THÔNG BÁO ĐẸP
------------------------- */
function showNotification(message, type = "warning") {

    let old = document.querySelector(".hk-alert");
    if (old) old.remove();

    const box = document.createElement("div");
    box.className = "hk-alert";

    const colors = {
        success: "#00ff88",
        warning: "#ffae00",
        error: "#ff3333",
        info: "#00bfff"
    };

    box.innerHTML = `
        <div class="hk-alert-content">
            <div class="hk-alert-icon">⚠</div>
            <div class="hk-alert-text">${message}</div>
        </div>
    `;

    box.style.cssText = `
        position:fixed;
        top:30px;
        right:30px;
        z-index:999999999;
        background:#111;
        border-left:5px solid ${colors[type]};
        color:#fff;
        padding:15px 20px;
        min-width:300px;
        border-radius:12px;
        box-shadow:0 0 25px rgba(0,0,0,.5);
        animation:slideIn .4s ease;
        font-family:sans-serif;
    `;

    document.body.appendChild(box);

    setTimeout(() => {
        box.style.opacity = "0";
        box.style.transform = "translateX(100px)";
        setTimeout(() => box.remove(), 500);
    }, 3500);
}

const style = document.createElement("style");
style.innerHTML = `
@keyframes slideIn{
    from{
        opacity:0;
        transform:translateX(100px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}
`;
document.head.appendChild(style);

/* -------------------------
   CHỐNG SPAM FORM
------------------------- */
commentForm.addEventListener("submit", function(e){

    const now = Date.now();

    submitTimes = submitTimes.filter(
        time => now - time < BLOCK_TIME
    );

    submitTimes.push(now);

    if(submitTimes.length > MAX_SUBMIT){

        e.preventDefault();

        btnSubmit.disabled = true;
        btnSubmit.innerHTML = "🚫 Đã khóa";

        showNotification(
            "Bạn thao tác quá nhanh! Hệ thống đã tạm khóa 60 giây.",
            "error"
        );

        let countdown = 60;

        const timer = setInterval(() => {

            btnSubmit.innerHTML =
                `⏳ ${countdown}s`;

            countdown--;

            if(countdown < 0){

                clearInterval(timer);

                btnSubmit.disabled = false;
                btnSubmit.innerHTML = "Gửi bình luận";

                submitTimes = [];

                showNotification(
                    "Đã mở khóa bình luận.",
                    "success"
                );
            }

        },1000);
    }
});


function lockWebsite(reason = "Phát hiện hành vi truy cập công cụ dành cho nhà phát triển.") {
    if (document.getElementById("hk-lock")) return;

    const overlay = document.createElement("div");
    overlay.id = "hk-lock";

    overlay.innerHTML = `
        <div class="hk-bg"></div>

        <div class="hk-card">
            <div class="hk-icon">🤖</div>

            <h1>HOANG KUN SECURITY</h1>

            <div class="hk-message">
                <span class="warn">⚠</span>
                <div>
                    <p>${reason}</p>
                    <small>Trang web đã bị khóa vì lý do bảo mật</small>
                </div>
            </div>

            <button onclick="location.reload()">🔄 TẢI LẠI TRANG</button>

            <p class="hk-footer">© 2026 HOANG KUN</p>
        </div>
    `;

    const style = document.createElement("style");
    style.innerHTML = `
    #hk-lock{
        position:fixed;
        inset:0;
        z-index:999999999;
        display:flex;
        justify-content:center;
        align-items:center;
        font-family:Poppins, sans-serif;
        overflow:hidden;
    }

    /* nền sao */
    .hk-bg{
        position:absolute;
        inset:0;
        background: radial-gradient(circle at center, #0b001a, #05010f 60%, #000);
    }

    .hk-bg::before{
        content:"";
        position:absolute;
        inset:0;
        background-image: radial-gradient(#7c3aed 1px, transparent 1px);
        background-size: 60px 60px;
        opacity:0.25;
        animation: move 20s linear infinite;
    }

    @keyframes move{
        from{transform:translateY(0);}
        to{transform:translateY(-200px);}
    }

    /* card chính */
    .hk-card{
        position:relative;
        width:520px;
        max-width:92%;
        padding:50px 35px;
        border-radius:25px;
        text-align:center;
        background:rgba(15, 10, 40, 0.6);
        border:1px solid rgba(124,58,237,0.3);
        backdrop-filter:blur(18px);
        box-shadow:
            0 0 25px rgba(0,212,255,0.3),
            0 0 60px rgba(124,58,237,0.4);
        animation: pop .5s ease;
    }

    @keyframes pop{
        from{transform:scale(0.8); opacity:0;}
        to{transform:scale(1); opacity:1;}
    }

    /* icon robot */
    .hk-icon{
        width:90px;
        height:90px;
        margin:auto;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:42px;
        border-radius:50%;
        background:linear-gradient(135deg,#00d4ff,#7c3aed);
        box-shadow:0 0 30px #00d4ff;
        margin-bottom:20px;
    }

    h1{
        font-size:28px;
        font-weight:800;
        background:linear-gradient(90deg,#00d4ff,#a855f7,#ff00ff);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        margin-bottom:20px;
    }

    /* message box */
    .hk-message{
        display:flex;
        gap:12px;
        text-align:left;
        padding:18px;
        border-radius:15px;
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(255,255,255,0.1);
        margin-bottom:25px;
    }

    .warn{
        color:#ffcc00;
        font-size:20px;
    }

    .hk-message p{
        margin:0;
        color:#fff;
        font-size:14px;
    }

    .hk-message small{
        color:#aaa;
    }

    button{
        padding:12px 30px;
        border:none;
        border-radius:12px;
        cursor:pointer;
        font-weight:600;
        color:white;
        background:linear-gradient(90deg,#00d4ff,#7c3aed);
        box-shadow:0 0 20px rgba(124,58,237,0.5);
        transition:0.3s;
    }

    button:hover{
        transform:scale(1.05);
    }

    .hk-footer{
        margin-top:15px;
        font-size:12px;
        color:#777;
    }
    `;

    document.head.appendChild(style);
    document.body.appendChild(overlay);
}

  /* =========================
   ANTI DEVTOOLS + RIGHT CLICK
   ========================= */

function blockAction(reason) {
    lockWebsite(reason);
}

/* CHẶN CHUỘT PHẢI */
document.addEventListener("contextmenu", function(e){
    e.preventDefault();
    showNotification("Chuột phải đã bị vô hiệu hóa!", "warning");
});

/* CHẶN PHÍM DEVTOOLS */
document.addEventListener("keydown", function(e){

    const key = e.key.toLowerCase();

    const blocked =
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && (key === "i" || key === "j" || key === "c")) ||
        (e.ctrlKey && key === "u") ||
        (e.ctrlKey && key === "s");

    if(blocked){
        e.preventDefault();
        e.stopPropagation();

        blockAction("Phát hiện truy cập công cụ lập trình (DevTools).");
    }
}, true);

/* CHẶN COPY */
document.addEventListener("copy", function(e){
    e.preventDefault();
    showNotification("Copy đã bị vô hiệu hóa!", "warning");
});

/* CHẶN SELECT ALL */
document.addEventListener("selectstart", function(e){
    e.preventDefault();
});

/* PHÁT HIỆN DEVTOOLS MỞ (DETECT THÊM) */
let devtools = false;

setInterval(() => {
    const widthThreshold = window.outerWidth - window.innerWidth > 200;
    const heightThreshold = window.outerHeight - window.innerHeight > 200;

    if((widthThreshold || heightThreshold) && !devtools){
        devtools = true;
        blockAction("DevTools đã được phát hiện!");
    }
}, 1000);
  
</script>

</body>
</html>
