<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome | Nguyễn Việt Hoàng</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }
    
    body {
      background: #110622;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden; transition: opacity 0.8s ease-in-out;
    }
    
    .intro-icons { display: flex; gap: 20px; margin-bottom: 30px; }
    
    .icon-circle {
      width: 50px; height: 50px; border-radius: 50%; background: rgba(124, 58, 237, 0.1);
      display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff;
      box-shadow: 0 0 25px rgba(124, 58, 237, 0.4); border: 1px solid rgba(124, 58, 237, 0.2);
    }
    
    /* Layout chứa chữ */
    .intro-title { 
      color: #ffffff; font-size: 45px; font-weight: 700; margin-bottom: 5px; 
      display: flex; gap: 12px; justify-content: center;
    }
    .intro-subtitle { 
      color: #a855f7; font-size: 50px; font-weight: 800; text-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
      display: flex; gap: 15px; justify-content: center; margin-bottom: 40px; 
    }
    
    .intro-typing-box {
      background: rgba(124, 58, 237, 0.15); border: 1px solid rgba(124, 58, 237, 0.3);
      padding: 10px 25px; border-radius: 999px; display: flex; align-items: center; gap: 10px;
      color: #c084fc; font-size: 18px; box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
    }
    
    .cursor-blink { font-weight: bold; animation: blink 0.8s infinite; color: #c084fc; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* --- CÁC HƯỚNG BAY --- */
    .fade-up { opacity: 0; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .fade-left { opacity: 0; transform: translateX(-50px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .fade-right { opacity: 0; transform: translateX(50px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
    
    /* Kích hoạt hiện lên */
    .show { opacity: 1 !important; transform: translate(0, 0) !important; }

    @media (max-width: 768px) { 
      .intro-title { font-size: 30px; gap: 8px; } 
      .intro-subtitle { font-size: 35px; gap: 10px; } 
    }
  </style>
</head>
<body>

  <div class="intro-icons">
    <div class="icon-circle fade-up"><i class="fas fa-code"></i></div>
    <div class="icon-circle fade-up"><i class="fas fa-user"></i></div>
    <div class="icon-circle fade-up"><i class="fab fa-github"></i></div>
  </div>
  
  <h1 class="intro-title">
    <span class="fade-left">Welcome</span>
    <span class="fade-up">To</span>
    <span class="fade-right">My</span>
  </h1>
  
  <h2 class="intro-subtitle">
    <span class="fade-left">Portfolio</span>
    <span class="fade-right">Website</span>
  </h2>
  
  <div class="intro-typing-box fade-up" id="link-box">
    <i class="fas fa-globe"></i>
    <span id="typing-text"></span><span class="cursor-blink">|</span>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const textToType = "hoangkunstore.id.vn"; 
      const typingElement = document.getElementById("typing-text");
      
      const icons = document.querySelectorAll(".icon-circle");
      const titleWords = document.querySelectorAll(".intro-title span");
      const subtitleWords = document.querySelectorAll(".intro-subtitle span");
      const linkBox = document.getElementById("link-box");
      
      let delay = 300; 
      
      // 1. Icon hiện lần lượt từ dưới lên
      icons.forEach((icon, index) => {
        setTimeout(() => { icon.classList.add("show"); }, delay + (index * 150));
      });
      
      delay += 600; // Đợi icon hiện xong

      // 2. Chữ "Welcome To My" bay từ 3 hướng vào cùng lúc
      setTimeout(() => {
        titleWords.forEach(word => word.classList.add("show"));
      }, delay);
      
      delay += 300;

      // 3. Chữ "Portfolio Website" bay từ 2 hướng vào cùng lúc
      setTimeout(() => {
        subtitleWords.forEach(word => word.classList.add("show"));
      }, delay);
      
      delay += 400;

      // 4. Hiện hộp link từ dưới lên
      setTimeout(() => {
        linkBox.classList.add("show");
      }, delay);
      
      delay += 500;

      // 5. Chờ hộp link hiện xong thì bắt đầu gõ chữ
      setTimeout(() => {
        let index = 0;
        function typeEffect() {
          if (index < textToType.length) {
            typingElement.textContent += textToType.charAt(index);
            index++;
            setTimeout(typeEffect, 80); // Tốc độ gõ
          } else {
            // Gõ xong -> Mờ trang -> Đá về trang chính
            setTimeout(() => {
              document.body.style.opacity = "0"; 
              setTimeout(() => {
                sessionStorage.setItem("introDone", "true");
                window.location.href = "loading.html";
              }, 800);
            }, 1000);
          }
        }
        
        typeEffect();
      }, delay);
      
    });
  </script>

</body>
</html>
